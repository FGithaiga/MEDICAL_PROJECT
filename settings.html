<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <!-- Link your external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Account Settings</h1>
        <p>Manage your preferences and account details</p>
    </header>

    <main class="settings-container">
        <section class="profile-settings">
            <h2>Profile Information</h2>
            <form action="update-profile.php" method="post">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" value="Faith" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" value="faith@example.com" required>

                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" value="+1234567890">

                <button type="submit" class="btn">Update Profile</button>
            </form>
        </section>

        <section class="password-settings">
            <h2>Change Password</h2>
            <form action="update-password.php" method="post">
                <label for="current-password">Current Password</label>
                <input type="password" id="current-password" name="current-password" required>

                <label for="new-password">New Password</label>
                <input type="password" id="new-password" name="new-password" required>

                <label for="confirm-password">Confirm New Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required>

                <button type="submit" class="btn">Change Password</button>
            </form>
        </section>

        <section class="preferences-settings">
            <h2>Preferences</h2>
            <form action="update-preferences.php" method="post">
                <label>
                    <input type="checkbox" name="email-notifications" checked>
                    Enable Email Notifications
                </label>

                <label>
                    <input type="checkbox" name="sms-alerts">
                    Enable SMS Alerts
                </label>

                <button type="submit" class="btn">Save Preferences</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Medical Project. All rights reserved.</p>
    </footer>

</body>
</html>
