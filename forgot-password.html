<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <!-- Link your external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Forgot Password</h1>
        <p>Reset your account password</p>
    </header>

    <main class="forgot-password-container">
        <section class="instructions">
            <p>
                Enter your registered email address below. We’ll send you a link to reset your password.
            </p>
        </section>

        <section class="reset-form">
            <form action="reset-password.php" method="post">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <button type="submit" class="btn">Send Reset Link</button>
            </form>
        </section>

        <section class="back-to-login">
            <p>
                Remembered your password? <a href="login.html">Back to Login</a>
            </p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Medical Project. All rights reserved.</p>
    </footer>

</body>
</html>
